version: '3.8'

services:
  app:
    image: ://microsoft.com
    volumes:
      - ../..:/workspace
    # 起動したままにする
    command: sleep infinity
    ports:
      - "8000:80"

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: sample_db
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin:latest
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      - db
